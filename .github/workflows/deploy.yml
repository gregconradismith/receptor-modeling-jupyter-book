name: deploy-book

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install book build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install SageMath
        run: |
          sudo apt-get update
          sudo apt-get install --yes sagemath

      - name: Install Sage notebook dependencies
        run: |
          sage -pip install -r requirements-sage.txt

      - name: Register stable SageMath kernel name
        run: |
          python - <<'PY'
          from jupyter_client.kernelspec import KernelSpecManager

          manager = KernelSpecManager()
          kernels = manager.find_kernel_specs()
          candidates = [
              (name, path)
              for name, path in kernels.items()
              if name.lower().startswith(("sagemath", "sage"))
          ]
          if not candidates:
              raise SystemExit("No SageMath kernelspec found after installing SageMath")

          _, path = sorted(candidates)[0]
          manager.install_kernel_spec(
              path,
              kernel_name="sagemath",
              user=True,
              replace=True,
          )
          PY
          jupyter kernelspec list

      - name: Build the book
        run: |
          jupyter-book build .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _build/html

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
